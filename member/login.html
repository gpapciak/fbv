<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Finca Buena Vida — Member Portal Login" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Member Login — Finca Buena Vida</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S3FVLMP76X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S3FVLMP76X');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="../assets/images/favicon-fbv.png" />
  <link rel="apple-touch-icon" href="../assets/images/favicon-fbv.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="member.css" />
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <a href="/" class="login-logo-link">
        <span class="login-logo-name">Finca Buena Vida</span>
        <span class="login-logo-sub">Dolphin Bay · Panama</span>
      </a>
    </div>

    <h1 class="login-title">Member Portal</h1>
    <p class="login-subtitle">Sign in to access dues, documents, and community resources.</p>

    <!-- Tab toggle -->
    <div class="login-tabs" role="tablist" aria-label="Sign-in method">
      <button
        class="login-tab active"
        id="tab-password"
        role="tab"
        aria-selected="true"
        aria-controls="panel-password"
        data-panel="panel-password"
      >Email &amp; Password</button>
      <button
        class="login-tab"
        id="tab-magic"
        role="tab"
        aria-selected="false"
        aria-controls="panel-magic"
        data-panel="panel-magic"
      >Magic Link</button>
    </div>

    <!-- Panel: Email + Password -->
    <div id="panel-password" class="login-panel" role="tabpanel" aria-labelledby="tab-password">
      <form id="form-password" novalidate>
        <div class="form-field">
          <label for="pw-email">Email address</label>
          <input
            type="email"
            id="pw-email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-field">
          <label for="pw-pass">Password</label>
          <input
            type="password"
            id="pw-pass"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>
        <div id="pw-error" class="login-error" role="alert" aria-live="polite" hidden></div>
        <button type="submit" class="btn-login" id="pw-submit">Sign In</button>
      </form>
    </div>

    <!-- Panel: Magic Link -->
    <div id="panel-magic" class="login-panel" role="tabpanel" aria-labelledby="tab-magic" hidden>
      <p class="magic-info">Enter your email and we'll send you a one-click sign-in link — no password needed.</p>
      <form id="form-magic" novalidate>
        <div class="form-field">
          <label for="ml-email">Email address</label>
          <input
            type="email"
            id="ml-email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div id="ml-error" class="login-error" role="alert" aria-live="polite" hidden></div>
        <div id="ml-success" class="login-success" role="status" aria-live="polite" hidden>
          Check your inbox — a sign-in link is on its way.
        </div>
        <button type="submit" class="btn-login" id="ml-submit">Send Magic Link</button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/" class="login-back-link">← Back to Finca Buena Vida</a>
    </div>

  </div><!-- /login-card -->

  <!-- Decorative background elements -->
  <div class="login-bg-leaf login-bg-leaf-1" aria-hidden="true"></div>
  <div class="login-bg-leaf login-bg-leaf-2" aria-hidden="true"></div>
</div><!-- /login-wrap -->

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- FBV client config (fills window.FBV_CONFIG) -->
<script src="config.js"></script>

<script>
(function () {
  'use strict';

  // ---- Setup Supabase client ----
  const { supabaseUrl, supabaseAnonKey } = window.FBV_CONFIG || {};
  let sb = null;

  if (supabaseUrl && supabaseAnonKey &&
      !supabaseUrl.includes('your-project-id') &&
      !supabaseAnonKey.includes('your-anon-key')) {
    sb = supabase.createClient(supabaseUrl, supabaseAnonKey);
  }

  // ---- Handle auth callback (magic link / OAuth redirect) ----
  // Supabase v2 puts the session in the URL hash as #access_token=...
  async function handleAuthCallback() {
    if (!sb) return;
    const hash = window.location.hash;
    if (hash && (hash.includes('access_token') || hash.includes('type=magiclink') || hash.includes('type=recovery'))) {
      try {
        const { data, error } = await sb.auth.getSessionFromUrl({ storeSession: true });
        if (error) throw error;
        if (data && data.session) {
          window.location.replace('/member/portal.html');
        }
      } catch (err) {
        // Try the simpler approach — getSession picks up from hash automatically in v2
        const { data } = await sb.auth.getSession();
        if (data && data.session) {
          window.location.replace('/member/portal.html');
        }
      }
    }
  }

  // ---- Check if already logged in ----
  async function checkExistingSession() {
    if (!sb) return;
    const { data } = await sb.auth.getSession();
    if (data && data.session) {
      window.location.replace('/member/portal.html');
    }
  }

  // ---- Tab switching ----
  const tabs = document.querySelectorAll('.login-tab');
  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      tabs.forEach(function (t) {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      document.querySelectorAll('.login-panel').forEach(function (p) {
        p.hidden = true;
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.getElementById(tab.dataset.panel).hidden = false;
    });
  });

  // ---- Password sign-in ----
  document.getElementById('form-password').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('pw-email').value.trim();
    const password = document.getElementById('pw-pass').value;
    const errEl = document.getElementById('pw-error');
    const btn = document.getElementById('pw-submit');

    errEl.hidden = true;
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    if (!sb) {
      errEl.textContent = 'Portal is not yet configured. Please contact your administrator.';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      if (data && data.session) {
        window.location.replace('/member/portal.html');
      }
    } catch (err) {
      errEl.textContent = err.message || 'Sign-in failed. Please check your credentials.';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // ---- Magic link sign-in ----
  document.getElementById('form-magic').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('ml-email').value.trim();
    const errEl = document.getElementById('ml-error');
    const successEl = document.getElementById('ml-success');
    const btn = document.getElementById('ml-submit');

    errEl.hidden = true;
    successEl.hidden = true;
    btn.disabled = true;
    btn.textContent = 'Sending…';

    if (!sb) {
      errEl.textContent = 'Portal is not yet configured. Please contact your administrator.';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Send Magic Link';
      return;
    }

    try {
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.origin + '/member/portal.html',
        },
      });
      if (error) throw error;
      successEl.hidden = false;
      btn.textContent = 'Link Sent';
      document.getElementById('ml-email').value = '';
    } catch (err) {
      errEl.textContent = err.message || 'Failed to send magic link. Please try again.';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Send Magic Link';
    }
  });

  // ---- Init ----
  handleAuthCallback();
  checkExistingSession();

})();
</script>

</body>
</html>
